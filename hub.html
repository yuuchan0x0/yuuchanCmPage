<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>커미션</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --main:#3a9a60; --deep:#2a7a48; --dark:#1a6a40; --light:#60c080;
  --bg:#f0f8f0; --bg2:#eef6ee; --border:#a8d4b0; --text:#4a7050; --sub:#6aaa80;
  --hero1:#eef7ee; --hero2:#daeedc; --main-rgb:58,154,96;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; font-family: 'Noto Sans KR', sans-serif; color: #0a1e0e; line-height: 1.6; overflow-x: hidden; }
body { background: linear-gradient(165deg, var(--hero1) 0%, var(--hero2) 45%, var(--hero1) 100%); min-height: 100vh; }

.hub { max-width: 1120px; margin: 0 auto; padding: 72px 40px 64px; text-align: center; position: relative; }
.hub-badge { display: inline-block; background: var(--main); color: #fff; font-size: 12px; font-weight: 700; letter-spacing: 3px; padding: 6px 20px; border-radius: 999px; margin-bottom: 20px; }
.hub-title { font-family: 'Noto Serif KR', serif; font-size: 42px; font-weight: 700; color: var(--dark); letter-spacing: -1px; margin-bottom: 10px; }
.hub-sub { font-size: 15px; color: var(--text); line-height: 2; margin-bottom: 44px; white-space: pre-line; }

.card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 24px; }
.card {
  --c: var(--main);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 180px; padding: 34px 26px;
  background: rgba(255,255,255,0.72);
  border: 1px solid rgba(255,255,255,0.9);
  border-radius: 20px;
  box-shadow: 0 6px 24px rgba(0,0,0,0.05);
  text-decoration: none; cursor: pointer;
  transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
  position: relative; overflow: hidden;
}
.card::before {
  content: ''; position: absolute; inset: 0; opacity: 0;
  background: linear-gradient(160deg, transparent 40%, var(--c) 240%);
  transition: opacity 0.18s ease;
}
.card:hover { transform: translateY(-5px); box-shadow: 0 14px 34px rgba(0,0,0,0.09); background: #fff; }
.card:hover::before { opacity: 0.12; }
.card-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--c); margin-bottom: 16px; position: relative; }
.card-name { font-size: 19px; font-weight: 700; color: var(--dark); position: relative; display: flex; align-items: center; gap: 8px; }
.card-arrow { color: var(--c); font-size: 15px; transition: transform 0.18s ease; }
.card:hover .card-arrow { transform: translate(3px, -3px); }
.card-desc { font-size: 13px; color: var(--sub); margin-top: 8px; position: relative; word-break: keep-all; }

.hub-footer { margin-top: 52px; font-size: 12px; color: var(--sub); line-height: 2; white-space: pre-line; }
.hub-empty { background: rgba(255,255,255,0.7); border: 1px dashed var(--border); border-radius: 16px; padding: 40px; color: var(--sub); font-size: 14px; }

@media (max-width: 768px) {
  .hub { padding: 48px 20px 44px; }
  .hub-title { font-size: 28px; }
  .hub-sub { font-size: 13px; margin-bottom: 30px; }
  .card-grid { grid-template-columns: 1fr; gap: 14px; }
  .card { min-height: 120px; padding: 26px 20px; }
  .card-name { font-size: 17px; }
}
</style>
</head>
<body>
<div class="hub">
  <div class="hub-badge" id="hub-badge" style="display:none;"></div>
  <div class="hub-title" id="hub-title">커미션</div>
  <div class="hub-sub" id="hub-sub"></div>
  <div class="card-grid" id="card-grid">
    <div class="hub-empty">불러오는 중...</div>
  </div>
  <div class="hub-footer" id="hub-footer"></div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, onValue } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

/* ============================================================
   ★★★ 새 Firebase 프로젝트를 쓸 때는 이 부분만 교체하세요 ★★★
   ============================================================ */
const firebaseConfig = {
  apiKey: "AIzaSyDJemQYxfZ-xNLM91I9kXe_KBW1KxSCpHQ",
  authDomain: "jiyul-commission.firebaseapp.com",
  databaseURL: "https://jiyul-commission-default-rtdb.firebaseio.com",
  projectId: "jiyul-commission",
  storageBucket: "jiyul-commission.firebasestorage.app",
  messagingSenderId: "732523553497",
  appId: "1:732523553497:web:e0d0ae68ed4619795f54c8"
};
/* ============================================================ */

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* 메인 컬러 → 팔레트 (index.html 과 동일) */
function hexToHsl(hex) {
  hex = (hex || '#3a9a60').replace('#','');
  if (hex.length === 3) hex = hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
  const r = parseInt(hex.substr(0,2),16)/255, g = parseInt(hex.substr(2,2),16)/255, b = parseInt(hex.substr(4,2),16)/255;
  const max = Math.max(r,g,b), min = Math.min(r,g,b);
  let h = 0, s = 0; const l = (max+min)/2; const d = max-min;
  if (d) {
    s = l > 0.5 ? d/(2-max-min) : d/(max+min);
    if (max === r) h = ((g-b)/d + (g < b ? 6 : 0));
    else if (max === g) h = (b-r)/d + 2;
    else h = (r-g)/d + 4;
    h *= 60;
  }
  return { h: h, s: s, l: l };
}
function hslToHex(h, s, l) {
  s = Math.max(0, Math.min(1, s)); l = Math.max(0, Math.min(1, l));
  const c = (1 - Math.abs(2*l - 1)) * s, x = c * (1 - Math.abs((h/60) % 2 - 1)), m = l - c/2;
  let r=0,g=0,b=0;
  if (h < 60)      { r=c; g=x; }
  else if (h<120)  { r=x; g=c; }
  else if (h<180)  { g=c; b=x; }
  else if (h<240)  { g=x; b=c; }
  else if (h<300)  { r=x; b=c; }
  else             { r=c; b=x; }
  const to = v => Math.round((v+m)*255).toString(16).padStart(2,'0');
  return '#' + to(r) + to(g) + to(b);
}
function applyTheme(base) {
  const c = hexToHsl(base), h = c.h, s = c.s;
  const p = {
    main: base,
    deep:   hslToHex(h, Math.min(1, s*1.05), 0.32),
    dark:   hslToHex(h, Math.min(1, s*1.05), 0.26),
    light:  hslToHex(h, Math.min(1, s*0.95), 0.56),
    bg:     hslToHex(h, Math.max(0.15, s*0.45), 0.95),
    bg2:    hslToHex(h, Math.max(0.12, s*0.35), 0.965),
    border: hslToHex(h, Math.max(0.20, s*0.50), 0.75),
    text:   hslToHex(h, Math.max(0.12, s*0.30), 0.36),
    sub:    hslToHex(h, Math.max(0.15, s*0.40), 0.54),
    hero1:  hslToHex(h, Math.max(0.15, s*0.45), 0.955),
    hero2:  hslToHex(h, Math.max(0.20, s*0.50), 0.885)
  };
  Object.keys(p).forEach(k => document.documentElement.style.setProperty('--' + k, p[k]));
}

const esc = t => String(t || '').replace(/[<>&"]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c]));

let hub = {}, sites = {};
function render() {
  applyTheme(hub.color || '#3a9a60');
  document.title = hub.page_title || hub.title || '커미션';

  const badge = document.getElementById('hub-badge');
  badge.textContent = hub.badge || '';
  badge.style.display = hub.badge ? '' : 'none';
  document.getElementById('hub-title').textContent = hub.title || '커미션';
  document.getElementById('hub-sub').textContent = hub.subtitle || '';
  document.getElementById('hub-footer').textContent = hub.footer || '';

  const keys = Object.keys(sites)
    .filter(k => sites[k] && sites[k].visible !== false)
    .sort((a, b) => (sites[a].order || 0) - (sites[b].order || 0) || a.localeCompare(b));

  const grid = document.getElementById('card-grid');
  if (!keys.length) {
    grid.innerHTML = '<div class="hub-empty">아직 등록된 커미션이 없어요.<br>init.html 에서 커미션을 추가해 주세요.</div>';
  } else {
    grid.innerHTML = keys.map(k => {
      const s = sites[k];
      const desc = s.desc ? '<div class="card-desc">' + esc(s.desc) + '</div>' : '';
      return '<a class="card" style="--c:' + esc(s.color || '#3a9a60') + '" href="index.html?site=' + esc(k) + '">' +
               '<div class="card-dot"></div>' +
               '<div class="card-name">' + esc(s.name || k) + '<span class="card-arrow">↗</span></div>' +
               desc +
             '</a>';
    }).join('');
  }
  window.parent.postMessage({ height: document.body.scrollHeight }, '*');
}

onValue(ref(db, '_hub'), snap => { hub = snap.val() || {}; render(); });
onValue(ref(db, '_sites'), snap => { sites = snap.val() || {}; render(); });
</script>
</body>
</html>
