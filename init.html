label { font-size: 13px; font-weight: 700; display: block; margin-bottom: 6px; }
select, input[type=text] { width: 100%; padding: 10px 14px; border: 1px solid #c0d8c0; border-radius: 8px; font-size: 14px; font-family: inherit; margin-bottom: 16px; }
.btn { width: 100%; padding: 14px; border: 0; border-radius: 10px; background: #3a9a60; color: #fff; font-size: 15px; font-weight: 700; font-family: inherit; cursor: pointer; }
.btn:hover { opacity: 0.85; }
.btn:disabled { opacity: 0.5; cursor: default; }
#status { font-size: 14px; margin-top: 20px; line-height: 1.8; }

    <option value="rigging">Live2D 리깅 (예시 내용 포함)</option>

window.run = function() {
  const key = document.getElementById('tpl').value;
  const color = document.getElementById('color').value.trim() || '#3a9a60';
  const siteKey = document.getElementById('key').value.trim().replace(/[^a-zA-Z0-9_-]/g, '');
  if (!siteKey) { alert('사이트 키를 입력해 주세요.'); return; }
  if (!confirm('"' + siteKey + '" 사이트의 기존 데이터를 덮어씁니다. 계속할까요?')) return;

  const t = TEMPLATES[key];
  const sections = JSON.parse(JSON.stringify(SECTIONS));
  if (key === 'rigging') {
    sections.price.subtitle = '복잡도에 따라 추가금 발생 가능 · 정확한 금액은 문의 후 안내';
    sections.price.note = '💚 정확한 금액은 문의 주시면 견적서로 안내드립니다.\n작업 시작 후 환불 불가이므로 반드시 견적 확인 후 결제해 주세요!';
  }

  const data = {
    site: t.site,
    theme: { main: color },
    sections: sections,
    notice: t.notice,
    status: t.status,
    process: t.process,
    price: t.price,
    samples: t.samples,
    faq: t.faq,
    collab: { visible: false, items: [ { image: '', name: '작가명', link: '', main_desc: '협업 혜택', sub_desc: '설명' } ] },
    refund: JSON.parse(JSON.stringify(REFUND))
  };
  if (key === 'rigging') {
    data.refund.rows = [
      { stage: '작업 시작 전', rate: '전액 환불', type: 'full' },
      { stage: '파츠 정리 중', rate: '70% 환불', type: 'partial' },
      { stage: '리깅 작업 시작', rate: '50% 환불', type: 'partial' },
      { stage: '50% 이상 진행', rate: '환불 불가', type: 'none' }
    ];
  }

  const btn = document.getElementById('go');
  btn.disabled = true; btn.textContent = '로그인 중...';
  const email = document.getElementById('email').value.trim();
  const pw = document.getElementById('pw').value;

  signInWithEmailAndPassword(auth, email, pw)
    .then(function() {
      btn.textContent = '업로드 중...';
      return Promise.all([
        set(ref(db, siteKey), data),
        set(ref(db, '_sites/' + siteKey), { name: data.site.name, color: color, desc: data.site.desc || '', order: 99, visible: true })
      ]);
    })
    .then(function() {
      btn.textContent = '완료됨';
      document.getElementById('status').innerHTML =
        '<span style="color:#2a8a50;font-weight:700;">✅ 업로드 완료!</span><br>' +
        '관리자 : <a href="admin.html?site=' + siteKey + '">admin.html?site=' + siteKey + '</a><br>' +
        '페이지 : <a href="site.html?site=' + siteKey + '" target="_blank">site.html?site=' + siteKey + '</a>';
    })
    .catch(function(e) {
      btn.disabled = false; btn.textContent = '🚀 업로드 실행';
      var msg = e.message;
      if (e.code === 'auth/invalid-credential') msg = '이메일 또는 비밀번호가 올바르지 않아요.';
      else if (e.code === 'auth/configuration-not-found') msg = 'Firebase 콘솔 → Authentication → 시작하기 를 먼저 눌러 인증을 활성화해 주세요.';
      else if (String(e.message).indexOf('permission') !== -1) msg = '쓰기 권한이 없어요. DB 규칙에 이 계정의 UID가 등록됐는지 확인해 주세요.';
      document.getElementById('status').innerHTML = '<span style="color:#c03030;">❌ ' + msg + '</span>';
    });
};
</script>
</body>
</html>
